<!DOCTYPE html>
<html>
<head>
<style>
  body { background: #000; margin: 0; display: flex; align-items: center; justify-content: center; width: 1000px; height: 1000px; }
  .logo-container { width: 600px; height: 600px; }
  .main-shape {
    fill: none;
    stroke: url(#grad);
    stroke-width: 20;
    stroke-linejoin: round;
  }
  .pulse-wave {
    fill: none;
    stroke: #ffffff;
    stroke-width: 15;
    stroke-linecap: round;
    stroke-linejoin: round;
    filter: drop-shadow(0 0 10px rgba(0, 242, 254, 0.8));
  }
</style>
</head>
<body>
  <svg viewBox="0 0 1000 1000" class="logo-container">
    <defs>
      <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" style="stop-color:#00f2fe;stop-opacity:1" />
        <stop offset="100%" style="stop-color:#4facfe;stop-opacity:1" />
      </linearGradient>
    </defs>
    
    <!-- Geometric Hexagon (Property/Structure) -->
    <path class="main-shape" d="M 500 150 L 850 350 L 850 650 L 500 850 L 150 650 L 150 350 Z" />
    
    <!-- Central Pulse Wave (Intelligence/Active Monitoring) -->
    <path class="pulse-wave" d="M 250 500 L 400 500 L 450 350 L 550 650 L 600 500 L 750 500" />
    
    <!-- Tech Accent Dots -->
    <circle cx="500" cy="150" r="12" fill="#4facfe" />
    <circle cx="850" cy="350" r="12" fill="#4facfe" />
    <circle cx="850" cy="650" r="12" fill="#4facfe" />
    <circle cx="500" cy="850" r="12" fill="#4facfe" />
    <circle cx="150" cy="650" r="12" fill="#4facfe" />
    <circle cx="150" cy="350" r="12" fill="#4facfe" />
  </svg>
</body>
</html>
