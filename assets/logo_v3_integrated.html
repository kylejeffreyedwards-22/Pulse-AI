<!DOCTYPE html>
<html>
<head>
<style>
  body { background: #000; margin: 0; display: flex; align-items: center; justify-content: center; width: 1000px; height: 1000px; }
  .logo-container { width: 800px; height: 800px; font-family: 'Inter', sans-serif; }
  .p-shape {
    fill: none;
    stroke: url(#grad);
    stroke-width: 35;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
  .pulse-bridge {
    fill: none;
    stroke: #ffffff;
    stroke-width: 20;
    stroke-linecap: round;
    stroke-linejoin: round;
    filter: drop-shadow(0 0 12px rgba(0, 242, 254, 0.9));
  }
  .company-text {
    fill: white;
    font-size: 80px;
    font-weight: 900;
    letter-spacing: -2px;
    text-transform: uppercase;
  }
  .ai-text {
    fill: #00f2fe;
    font-weight: 900;
  }
</style>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&display=swap" rel="stylesheet">
</head>
<body>
  <svg viewBox="0 0 1000 1000" class="logo-container">
    <defs>
      <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" style="stop-color:#00f2fe;stop-opacity:1" />
        <stop offset="100%" style="stop-color:#4facfe;stop-opacity:1" />
      </linearGradient>
    </defs>
    
    <!-- Stylized 'P' mixed with architectural structure -->
    <path class="p-shape" d="M 350 750 L 350 250 C 350 150, 650 150, 650 350 C 650 550, 350 550, 350 550" />
    
    <!-- Pulse Wave bridging the P structure -->
    <path class="pulse-bridge" d="M 350 550 L 450 550 L 500 400 L 550 700 L 600 550 L 750 550" />
    
    <!-- Integrated Text -->
    <text x="500" y="900" text-anchor="middle" class="company-text">
      Pulse <tspan class="ai-text">AI</tspan>
    </text>
  </svg>
</body>
</html>
