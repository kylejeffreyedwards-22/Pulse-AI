<!DOCTYPE html>
<html>
<head>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&display=swap" rel="stylesheet">
<style>
  body { font-family: 'Inter', sans-serif; margin: 0; width: 1080px; height: 1080px; overflow: hidden; }
  .ad-container { 
    position: relative; 
    width: 100%; 
    height: 100%; 
    background-image: url('https://images.unsplash.com/photo-1499793983690-e29da59ef1c2?auto=format&fit=crop&w=1080&q=80');
    background-size: cover;
    background-position: center;
  }
  .overlay { 
    position: absolute; 
    inset: 0; 
    background: linear-gradient(180deg, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0.1) 50%, rgba(0,0,0,0.8) 100%); 
  }
  .leak-circle { 
    border: 12px solid #ff4b4b; 
    border-radius: 50%; 
    width: 400px; 
    height: 400px; 
    position: absolute; 
    top: 300px; 
    left: 340px; 
    box-shadow: 0 0 60px rgba(255, 75, 75, 0.6);
    display: flex;
    align-items: center;
    justify-content: center;
  }
</style>
</head>
<body>
  <div class="ad-container">
    <div class="overlay"></div>
    <div class="relative w-full h-full p-20 flex flex-col justify-between">
      <div>
        <div class="text-3xl font-black tracking-tighter text-cyan-400 mb-2 font-inter">PULSE AI</div>
        <h1 class="text-8xl font-black leading-none uppercase text-white">Stop Leaving<br>Money On The Table.</h1>
      </div>

      <div class="leak-circle">
        <div class="text-5xl font-black text-white bg-red-600/90 px-6 py-3 rounded-xl border border-white/50">LEAK FOUND</div>
      </div>

      <div class="flex justify-between items-end">
        <p class="text-4xl text-gray-100 max-w-xl leading-tight font-medium">
          Our AI identified <span class="text-white font-black underline decoration-cyan-500">$4,200 in missed revenue</span> on this property last month.
        </p>
        <div class="bg-white text-black text-3xl font-black px-10 py-6 rounded-full shadow-2xl">pulse-ai.news</div>
      </div>
    </div>
  </div>
</body>
</html>
