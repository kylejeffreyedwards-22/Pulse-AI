<!DOCTYPE html>
<html>
<head>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&display=swap" rel="stylesheet">
<style>
  body { font-family: 'Inter', sans-serif; margin: 0; width: 1080px; height: 1080px; overflow: hidden; }
  .ad-container { 
    position: relative; 
    width: 100%; 
    height: 100%; 
    background-image: url('https://images.unsplash.com/photo-1502672260266-1c1ef2d93688?auto=format&fit=crop&w=1080&q=80');
    background-size: cover;
    background-position: center;
  }
  .overlay { 
    position: absolute; 
    inset: 0; 
    background: linear-gradient(180deg, rgba(0,0,0,0.6) 0%, rgba(0,0,0,0.1) 50%, rgba(0,0,0,0.8) 100%); 
  }
  .sc-gradient { background: linear-gradient(90deg, #4facfe 0%, #00f2fe 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
</style>
</head>
<body class="bg-black">
  <div class="ad-container">
    <div class="overlay"></div>
    <div class="relative w-full h-full p-20 flex flex-col justify-between overflow-hidden">
      
      <div>
        <div class="text-3xl font-black tracking-tighter text-blue-400 mb-2">PULSE AI</div>
        <h1 class="text-8xl font-black leading-none uppercase text-white shadow-2xl">Surfside's Secret<br><span class="sc-gradient">Weapon.</span></h1>
      </div>

      <div class="space-y-12 bg-black/40 p-10 rounded-3xl border border-white/10 backdrop-blur-sm">
        <div class="flex items-start gap-8">
          <div class="w-20 h-20 bg-blue-500/30 rounded-2xl flex items-center justify-center text-4xl border border-blue-400/50">💎</div>
          <p class="text-4xl text-gray-100 font-medium">Hyper-local demand monitoring for <span class="text-white font-bold underline decoration-blue-500">The Grand Strand</span>.</p>
        </div>
        <div class="flex items-start gap-8">
          <div class="w-20 h-20 bg-blue-500/30 rounded-2xl flex items-center justify-center text-4xl border border-blue-400/50">🚀</div>
          <p class="text-4xl text-gray-100 font-medium">Beat the VRBO algorithms and <span class="text-white font-bold underline decoration-blue-500">rank #1 in SC</span>.</p>
        </div>
      </div>

      <div class="flex justify-between items-end">
        <p class="text-3xl text-gray-200 max-w-lg leading-relaxed italic font-medium">
          "The AI edge that knows South Carolina better than the locals."
        </p>
        <div class="bg-blue-600 text-white text-3xl font-black px-10 py-6 rounded-full shadow-[0_0_30px_rgba(37,99,235,0.5)] border border-white/20">pulse-ai.news</div>
      </div>
    </div>
  </div>
</body>
</html>
