<!DOCTYPE html>
<html>
<head>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&display=swap" rel="stylesheet">
<style>
  body { font-family: 'Inter', sans-serif; background: #000; color: white; width: 1080px; height: 1080px; margin: 0; display: flex; align-items: center; justify-content: center; }
  .sc-gradient { background: linear-gradient(90deg, #4facfe 0%, #00f2fe 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .palm-overlay { position: absolute; bottom: 0; right: 0; opacity: 0.1; width: 600px; }
</style>
</head>
<body class="bg-gradient-to-br from-gray-900 to-black">
  <div class="relative w-full h-full p-20 flex flex-col justify-between overflow-hidden">
    
    <div>
      <div class="text-3xl font-black tracking-tighter text-blue-400 mb-2">PULSE AI</div>
      <h1 class="text-8xl font-black leading-none uppercase">Surfside's Secret<br><span class="sc-gradient">Weapon.</span></h1>
    </div>

    <div class="space-y-12">
      <div class="flex items-start gap-8">
        <div class="w-20 h-20 bg-blue-500/20 rounded-2xl flex items-center justify-center text-4xl">💎</div>
        <p class="text-4xl text-gray-300 font-medium">Hyper-local demand monitoring for <span class="text-white font-bold">The Grand Strand</span>.</p>
      </div>
      <div class="flex items-start gap-8">
        <div class="w-20 h-20 bg-blue-500/20 rounded-2xl flex items-center justify-center text-4xl">🚀</div>
        <p class="text-4xl text-gray-300 font-medium">Beat the VRBO algorithms and <span class="text-white font-bold">rank #1 locally</span>.</p>
      </div>
    </div>

    <div class="flex justify-between items-end">
      <p class="text-3xl text-gray-400 max-w-lg leading-relaxed italic">
        "The AI edge that knows South Carolina better than the locals."
      </p>
      <div class="bg-blue-500 text-white text-3xl font-black px-10 py-6 rounded-full shadow-2xl shadow-blue-500/20">pulse-ai.news</div>
    </div>
  </div>
</body>
</html>
