<!DOCTYPE html>
<html>
<head>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&display=swap" rel="stylesheet">
<style>
  body { font-family: 'Inter', sans-serif; margin: 0; width: 1080px; height: 1080px; overflow: hidden; }
  .ad-container { 
    position: relative; 
    width: 100%; 
    height: 100%; 
    background-image: url('https://images.unsplash.com/photo-1512917774080-9991f1c4c750?auto=format&fit=crop&w=1080&q=80');
    background-size: cover;
    background-position: center;
  }
  .overlay { 
    position: absolute; 
    inset: 0; 
    background: rgba(0,0,0,0.5);
  }
  .pulse-gradient { background: linear-gradient(90deg, #00f2fe 0%, #4facfe 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .dashboard-box { background: rgba(0, 0, 0, 0.8); border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); }
</style>
</head>
<body>
  <div class="ad-container">
    <div class="overlay"></div>
    <div class="relative w-full h-full p-20 flex flex-col justify-between">
      <div>
        <div class="text-3xl font-black tracking-tighter pulse-gradient mb-2">PULSE AI</div>
        <h1 class="text-8xl font-black leading-none uppercase text-white">Your Portfolio.<br>On Autopilot.</h1>
      </div>

      <div class="dashboard-box p-12 rounded-3xl border-l-[12px] border-cyan-400">
        <div class="text-xl uppercase tracking-[0.2em] text-gray-400 mb-4">Real-Time Optimization</div>
        <div class="text-7xl font-black mb-2 text-white">+28% <span class="text-3xl text-cyan-400 font-bold uppercase tracking-tight">Revenue Lift</span></div>
        <div class="w-full h-3 bg-white/10 rounded-full overflow-hidden mt-4">
          <div class="w-[85%] h-full bg-gradient-to-r from-cyan-400 to-blue-500 shadow-[0_0_20px_#00f2fe]"></div>
        </div>
        <div class="mt-6 text-gray-300 text-2xl font-medium">Monitoring 1,200+ Global Data Points</div>
      </div>

      <div class="flex justify-between items-end">
        <p class="text-4xl text-gray-100 max-w-xl leading-snug">
          Maximize occupancy globally with <span class="text-white font-black italic">AI-driven revenue management</span>.
        </p>
        <div class="bg-white text-black text-3xl font-black px-10 py-6 rounded-full shadow-2xl">pulse-ai.news</div>
      </div>
    </div>
  </div>
</body>
</html>
