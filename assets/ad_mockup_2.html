<!DOCTYPE html>
<html>
<head>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&display=swap" rel="stylesheet">
<style>
  body { font-family: 'Inter', sans-serif; background: #050505; color: white; width: 1080px; height: 1080px; margin: 0; display: flex; align-items: center; justify-content: center; }
  .pulse-gradient { background: linear-gradient(90deg, #00f2fe 0%, #4facfe 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .dashboard-box { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); }
</style>
</head>
<body>
  <div class="relative w-full h-full p-20 flex flex-col justify-between">
    <div>
      <div class="text-3xl font-black tracking-tighter pulse-gradient mb-2">PULSE AI</div>
      <h1 class="text-8xl font-black leading-none uppercase">Your Portfolio.<br>On Autopilot.</h1>
    </div>

    <div class="dashboard-box p-12 rounded-3xl border-l-8 border-cyan-400">
      <div class="text-sm uppercase tracking-widest text-gray-500 mb-4">Real-Time Optimization</div>
      <div class="text-6xl font-bold mb-2">+28% <span class="text-2xl text-cyan-400">Revenue Lift</span></div>
      <div class="w-full h-2 bg-white/10 rounded-full overflow-hidden">
        <div class="w-[85%] h-full bg-cyan-400"></div>
      </div>
      <div class="mt-4 text-gray-400 text-xl font-medium">Monitoring 1,200+ Global Data Points</div>
    </div>

    <div class="flex justify-between items-end">
      <p class="text-3xl text-gray-400 max-w-xl leading-relaxed">
        Maximize occupancy globally with <span class="text-white font-bold">AI-driven quantitative revenue management</span>.
      </p>
      <div class="bg-white text-black text-3xl font-black px-10 py-6 rounded-full">pulse-ai.news</div>
    </div>
  </div>
</body>
</html>
